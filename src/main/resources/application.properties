spring.application.name=traffic-analytics

# On Render: set spring.profiles.active=prod via env var
# Locally: application-local.properties overrides these
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Server port
server.port=${PORT:8080}

# TomTom API Configuration
tomtom.api.key=${TOMTOM_API_KEY:}
tomtom.api.url.traffic-flow=https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json
tomtom.api.url.incidents=https://api.tomtom.com/traffic/services/5/incidentDetails

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

# MongoDB — all data lives here (traffic + users)
spring.data.mongodb.uri=${MONGODB_URI:}
# Auto-create indexes (required for TTL index on TrafficData)
spring.data.mongodb.auto-index-creation=true

# Google OAuth2 client ID
google.client.id=${GOOGLE_CLIENT_ID:}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration.ms=86400000

# Rate limiting
rate.limit.requests-per-minute=60
