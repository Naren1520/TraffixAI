spring.application.name=traffic-analytics

# Profile Configuration (Loads application-secret.properties for API keys)
spring.profiles.include=secret

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:trafficdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=8080

# TomTom API Configuration (Set your key in application-secret.properties)
tomtom.api.url.traffic-flow=https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json
tomtom.api.url.incidents=https://api.tomtom.com/traffic/services/5/incidentDetails

