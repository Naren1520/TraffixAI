spring.application.name=traffic-analytics

# On Render: set spring.profiles.active=prod via env var
# Locally: application-local.properties overrides these
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# H2 Database configuration (for traffic data — kept as-is)
spring.datasource.url=jdbc:h2:mem:trafficdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate ddl auto
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=${PORT:8080}

# TomTom API Configuration — set TOMTOM_API_KEY in Render env vars
tomtom.api.key=${TOMTOM_API_KEY:}
tomtom.api.url.traffic-flow=https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json
tomtom.api.url.incidents=https://api.tomtom.com/traffic/services/5/incidentDetails

# Gemini AI Configuration — set GEMINI_API_KEY in Render env vars
gemini.api.key=${GEMINI_API_KEY:}

# MongoDB — set MONGODB_URI in Render env vars
spring.data.mongodb.uri=${MONGODB_URI:}

# Google OAuth2 client ID — set GOOGLE_CLIENT_ID in Render env vars
google.client.id=${GOOGLE_CLIENT_ID:}

# JWT secret — set JWT_SECRET in Render env vars (use a long random string)
jwt.secret=${JWT_SECRET:}
jwt.expiration.ms=86400000

