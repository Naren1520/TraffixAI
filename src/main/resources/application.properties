spring.application.name=traffic-analytics

# Load local profile by default
spring.profiles.active=local

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:trafficdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=${PORT:8080}

# MongoDB configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/traffixai}

# Google auth configuration
GOOGLE_AUTH_CLIENT_ID=${GOOGLE_AUTH_CLIENT_ID:}

# TomTom API Configuration
# Read from environment variable TOMTOM_API_KEY in Render or local dev
tomtom.api.key=${TOMTOM_API_KEY:}
tomtom.api.url.traffic-flow=https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json
tomtom.api.url.incidents=https://api.tomtom.com/traffic/services/5/incidentDetails

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

